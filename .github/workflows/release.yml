name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            name: linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -v -race -count=1 ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          go build -ldflags="-s -w -X main.version=${VERSION}" -o cake-autorate-go-${{ matrix.name }} .

      - name: Attach binary to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" cake-autorate-go-${{ matrix.name }}
